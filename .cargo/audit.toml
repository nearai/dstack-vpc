# Cargo audit configuration
# https://github.com/rustsec/rustsec/blob/main/cargo-audit/audit.toml.example

[advisories]
ignore = [
    # hickory-proto 0.25.2 NSEC3 unbounded loop (DNSSEC only).
    # Transitive dep: reqwest 0.12 -> hickory-resolver 0.25 -> hickory-proto 0.25.
    # Not exploitable: DNSSEC validation is not enabled.
    # Blocked: reqwest pins hickory ^0.25; no 0.25.x backport exists.
    "RUSTSEC-2026-0118",

    # hickory-proto 0.25.2 O(n²) name compression CPU exhaustion.
    # Same dep chain as above. Fix requires hickory-proto >= 0.26.1.
    "RUSTSEC-2026-0119",

    # rustls-webpki 0.102.8 CRL distribution point matching logic error.
    # Transitive dep: dcap-qvl 0.3.2 (yanked) -> rustls 0.22 -> rustls-webpki 0.102.8.
    # Cannot update: dcap-qvl is yanked and pins old rustls.
    "RUSTSEC-2026-0049",

    # rustls-webpki 0.102.8 URI name constraints incorrectly accepted.
    # Same dep chain as above. Requires cert misissuance to exploit.
    "RUSTSEC-2026-0098",

    # rustls-webpki 0.102.8 wildcard name constraints accepted.
    # Same dep chain as above. Requires cert misissuance to exploit.
    "RUSTSEC-2026-0099",

    # rustls-webpki 0.102.8 panic in CRL parsing.
    # Same dep chain as above. We don't use CRLs.
    "RUSTSEC-2026-0104",
]

informational_warnings = ["unmaintained", "unsound"]
